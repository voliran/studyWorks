<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Финансовый трекер</title>
    <meta charset="UTF-8">
</head>
<body>
<h1>Финансовый трекер</h1>

<div class="form-container">
    <h3>Добавить расходы</h3>
    <form action="/expenses/add" method="post">
        Сумма: <input type="number" step="0.01" name="amount" required>
        <button type="submit">Добавить</button>
    </form>
</div>

<div class="form-container">
    <h3>Добавить доходы</h3>
    <form action="/incomes/add" method="post">
        Сумма: <input type="number" step="0.01" name="amount" required>
        <button type="submit">Добавить</button>
    </form>
</div>

<table>
    <thead>
    <tr>
        <th>Дата</th>
        <th>Тип</th>
        <th>Сумма</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="transaction : ${transactions}">
        <td th:text="${#temporals.format(transaction.localDateTime, 'yyyy-MM-dd HH:mm')}">Дата</td>
        <td>
            <span th:if="${transaction.transactionType.name() == 'INCOME'}" class="income">Доходы</span>
            <span th:if="${transaction.transactionType.name() == 'EXPENSE'}" class="expense">Расходы</span>
        </td>
        <td th:text="${transaction.amount}">Amount</td>
    </tr>
    </tbody>
</table>
</body>
</html>
